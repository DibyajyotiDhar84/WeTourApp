<div class="register-wrapper">
  <div class="container">
    <div class="row justify-content-center align-items-center min-vh-100 py-5">
      <div class="col-md-7 col-lg-5">

        <div class="register-card p-4 p-md-5 shadow-lg">
          <div class="text-center mb-4">
            <span class="material-icons-round logo-icon">person_add</span>
            <h2 class="fw-bold brand-text">Join WeTour</h2>
            <p class="text-muted">Start your journey across the globe</p>
          </div>

          <form [formGroup]="registerForm" (submit)="onRegister()">

            <div class="row">
              <!-- Name -->
              <div class="col-md-12 mb-3">
                <label class="form-label small fw-bold">Full Name</label>
                <div class="input-group custom-input-group" [class.is-invalid-group]="isInvalid('name')">
                  <span class="input-group-text bg-transparent border-end-0">
                    <span class="material-icons-round text-muted icon-sm">badge</span>
                  </span>
                  <input type="text" formControlName="name" class="form-control border-start-0" placeholder="John Doe">
                </div>
                <div class="error-msg" *ngIf="isInvalid('name')">{{ getErrorMessage('name') }}</div>
              </div>

              <!-- Email -->
              <div class="col-md-12 mb-3">
                <label class="form-label small fw-bold">Email Address</label>
                <div class="input-group custom-input-group" [class.is-invalid-group]="isInvalid('email')">
                  <span class="input-group-text bg-transparent border-end-0">
                    <span class="material-icons-round text-muted icon-sm">email</span>
                  </span>
                  <input type="email" formControlName="email" class="form-control border-start-0"
                    placeholder="john@example.com">
                </div>
                <div class="error-msg" *ngIf="isInvalid('email')">{{ getErrorMessage('email') }}</div>
              </div>

              <!-- Phone -->
              <div class="col-md-6 mb-3">
                <label class="form-label small fw-bold">Phone Number</label>
                <input type="text" formControlName="phone" class="form-control custom-input"
                  [class.is-invalid]="isInvalid('phone')" placeholder="10-digit number">
                <div class="error-msg" *ngIf="isInvalid('phone')">{{ getErrorMessage('phone') }}</div>
              </div>
             
              <!-- Role -->
              <div class="col-md-6 mb-3">
                <label class="form-label small fw-bold">User Role</label>
                <input type="text" formControlName="role" class="form-control custom-input bg-light" readonly>
              </div>

              <!-- Password -->
              <div class="col-md-6 mb-3">
                <label class="form-label small fw-bold">Password</label>
                <input type="password" formControlName="password" class="form-control custom-input"
                  [class.is-invalid]="isInvalid('password')" placeholder="••••••">
                <div class="error-msg" *ngIf="isInvalid('password')">{{ getErrorMessage('password') }}</div>
              </div>

              <!-- Confirm Password -->
              <div class="col-md-6 mb-4">
                <label class="form-label small fw-bold">Confirm Password</label>
                <input type="password" formControlName="confirmPassword" class="form-control custom-input"
                  [class.is-invalid]="isInvalid('confirmPassword') || (registerForm.hasError('passwordMismatch') && registerForm.get('confirmPassword')?.touched)"
                  placeholder="••••••">
                <div class="error-msg"
                  *ngIf="registerForm.get('confirmPassword')?.touched && (registerForm.get('confirmPassword')?.invalid || registerForm.hasError('passwordMismatch'))">
                  {{ getErrorMessage('confirmPassword') }}
                </div>
              </div>
            </div>

            <button type="submit" [disabled]="registerForm.invalid" class="btn btn-register w-100 py-2 shadow-sm mb-3">
              Create Account
            </button>

            <div class="text-center">
              <span class="text-muted small">Already a member? </span>
              <a [routerLink]="['/login']" class="text-decoration-none fw-bold small brand-color">Login here</a>
            </div>
          </form>
        </div>

      </div>
    </div>
  </div>
</div>
